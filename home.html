<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lele Code</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 class="title">LELE SIGNAL</h1>

        <p class="subtitle">Convert your text into signal sound</p>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="Enter your message...">
</div>
            <button onclick="startConversion()">Generate Signal</button>
            <div class="speed-control">
    <label>Speed: <span id="speedValue">Normal</span></label>
    <input type="range" id="speedSlider" min="50" max="300" value="150">
</div>
            <div class="wave-container">
    <div class="wave" id="wave"></div>
        </div>

        <div class="output-section">
            <p>Signal Output:</p>
            <div id="signalDisplay"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
